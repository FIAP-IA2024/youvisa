version: '3.8'

services:
  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youvisa-ocr
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - MODE=local
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-dev}
      - WATCH_DIR=/app/watch
      - USE_MOCK_TEXTRACT=true
      - API_PORT=3001
    volumes:
      - ./watch:/app/watch
      - ./src:/app/src
      - /app/node_modules
    networks:
      - youvisa-network

networks:
  youvisa-network:
    external: true
