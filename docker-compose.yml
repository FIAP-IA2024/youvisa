name: youvisa

services:
  mongo:
    image: mongo:7
    container_name: youvisa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - youvisa-network

  minio:
    image: minio/minio:latest
    container_name: youvisa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - youvisa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    # One-shot service that creates the bucket once MinIO is up.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-youvisa-files} &&
      echo 'bucket ready' && exit 0
      "
    networks:
      - youvisa-network

  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: youvisa-api
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - API_NODE_ENV=${API_NODE_ENV:-development}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-5555}
      - API_KEY=${API_KEY}
      - API_IS_DEBUG=${API_IS_DEBUG:-true}
      # Sprint 4 forces local Mongo regardless of host .env (which may still
      # point at Atlas for Sprint 3 compatibility on other branches).
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=${MONGODB_DATABASE:-youvisa}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - mongo
    volumes:
      - ./app/api:/app
      - /app/node_modules
    networks:
      - youvisa-network
    command: npm run dev

  validation:
    build:
      context: ./app/validation
      dockerfile: Dockerfile
    container_name: youvisa-validation
    restart: unless-stopped
    ports:
      - "5556:5556"
    environment:
      - API_KEY=${API_KEY}
      - VALIDATION_PORT=5556
    networks:
      - youvisa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5556/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./app/agent
      dockerfile: Dockerfile
    container_name: youvisa-agent
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AGENT_PORT=7777
      # Forced local for Sprint 4 (see api comment above).
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=${MONGODB_DATABASE:-youvisa}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-youvisa-files}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORTAL_SECRET=${PORTAL_SECRET}
      - PORTAL_TTL_HOURS=${PORTAL_TTL_HOURS:-24}
      - PORTAL_BASE_URL=${PORTAL_BASE_URL:-http://localhost:3000}
      - API_URL=${API_URL:-http://api:5555}
      - API_KEY=${API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5}
      # CLAUDE_CODE_OAUTH_TOKEN deliberately NOT inherited from host shell —
      # Claude Desktop sets it for its own internal use, but that token is
      # different from the user's Max-plan token. Auth comes from the
      # claude_home volume's /home/node/.claude/.credentials.json file.
      - VALIDATION_URL=${VALIDATION_URL:-http://validation:5556}
    depends_on:
      - mongo
      - minio
      - api
      - validation
    volumes:
      - claude_home:/home/node/.claude
      - ./app/agent/src:/app/src:cached
      - ./app/agent/tests:/app/tests:cached
    networks:
      - youvisa-network

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: youvisa-frontend
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_URL=${API_URL:-http://api:5555}
      - API_KEY=${API_KEY}
      - PORTAL_SECRET=${PORTAL_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5555}
      - NEXT_PUBLIC_AGENT_URL=${NEXT_PUBLIC_AGENT_URL:-http://localhost:7777}
      - AGENT_URL=http://agent:7777
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-Teste1234}
      - DASHBOARD_SESSION_SECRET=${DASHBOARD_SESSION_SECRET:-changeme-changeme-changeme-changeme}
    depends_on:
      - api
      - agent
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - youvisa-network

networks:
  youvisa-network:
    driver: bridge

volumes:
  mongo-data:
  minio-data:
  claude_home:
    external: true
