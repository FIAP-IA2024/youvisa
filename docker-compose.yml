services:
  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: youvisa-api
    restart: always
    ports:
      - "5555:5555"
    environment:
      - API_NODE_ENV=${API_NODE_ENV:-development}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-5555}
      - API_KEY=${API_KEY}
      - API_IS_DEBUG=${API_IS_DEBUG:-true}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-dev}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
    volumes:
      - ./app/api:/app
      - /app/node_modules
    networks:
      - youvisa-network
    command: npm run dev

  n8n:
    image: n8nio/n8n:latest
    container_name: youvisa-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - LAMBDA_FUNCTION_URL=${LAMBDA_FUNCTION_URL}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - API_URL=${API_URL:-http://host.docker.internal:5555}
      - API_KEY=${API_KEY}
    volumes:
      - ./docker/n8n:/home/node/.n8n
      - ./app/n8n/workflows:/workflows
    networks:
      - youvisa-network

  ocr:
    build:
      context: ./app/ocr/document-processor
      dockerfile: Dockerfile
    container_name: youvisa-ocr
    restart: always
    ports:
      - "5556:5556"
    environment:
      - OCR_DOCUMENT_PROCESSOR_NODE_ENV=${OCR_DOCUMENT_PROCESSOR_NODE_ENV:-development}
      - OCR_DOCUMENT_PROCESSOR_MODE=${OCR_DOCUMENT_PROCESSOR_MODE:-local}
      - OCR_DOCUMENT_PROCESSOR_PORT=${OCR_DOCUMENT_PROCESSOR_PORT:-5556}
      - OCR_DOCUMENT_PROCESSOR_USE_MOCK_TEXTRACT=${OCR_DOCUMENT_PROCESSOR_USE_MOCK_TEXTRACT:-true}
      - OCR_DOCUMENT_PROCESSOR_WATCH_DIR=${OCR_DOCUMENT_PROCESSOR_WATCH_DIR:-/app/watch}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-dev}
    volumes:
      - ./app/ocr/document-processor/watch:/app/watch
      - ./app/ocr/document-processor/src:/app/src
      - /app/node_modules
    networks:
      - youvisa-network
    command: npm run dev

networks:
  youvisa-network:
    driver: bridge
