version: '3.8'

services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: youvisa-backend
    restart: always
    ports:
      - "5555:5555"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_HOST=0.0.0.0
      - API_PORT=5555
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-dev}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - IS_DEBUG=${IS_DEBUG:-true}
    volumes:
      - ./app/backend:/app
      - /app/node_modules
    networks:
      - youvisa-network
    command: npm run dev

  n8n:
    image: n8nio/n8n:latest
    container_name: youvisa-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - LAMBDA_FUNCTION_URL=${LAMBDA_FUNCTION_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:5555}
    volumes:
      - ./docker/n8n:/home/node/.n8n
      - ./app/n8n/workflows:/workflows
    networks:
      - youvisa-network

networks:
  youvisa-network:
    driver: bridge
