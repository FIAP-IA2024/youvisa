version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: youvisa-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-youvisa}
    volumes:
      - ./docker/mongodb:/data/db
    networks:
      - youvisa-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: youvisa-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_HOST=0.0.0.0
      - API_PORT=3000
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin123}@mongodb:27017/${MONGO_INITDB_DATABASE:-youvisa}?authSource=admin
      - MONGODB_DATABASE=${MONGO_INITDB_DATABASE:-youvisa}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - IS_DEBUG=${IS_DEBUG:-true}
    volumes:
      - ./app/backend:/app
      - /app/node_modules
    networks:
      - youvisa-network
    depends_on:
      mongodb:
        condition: service_healthy
    command: npm run dev

  n8n:
    image: n8nio/n8n:latest
    container_name: youvisa-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - LAMBDA_FUNCTION_URL=${LAMBDA_FUNCTION_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    volumes:
      - ./docker/n8n:/home/node/.n8n
      - ./app/n8n-workflows:/workflows
    networks:
      - youvisa-network
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  youvisa-network:
    driver: bridge
